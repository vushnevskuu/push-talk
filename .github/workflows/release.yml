# Builds VoiceInsert.app and attaches a ZIP to the GitHub Release for the pushed tag (e.g. v1.0.0).
# Requires: tag push; GITHUB_TOKEN (default) with contents: write.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # Image/architecture for prebuilt binaries follows GitHub’s current macos-latest runner.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build and package .app
        env:
          CI: "true"
          VOICEINSERT_ENTITLEMENT_BASE_URL: "https://push-talk.vercel.app"
        run: |
          set -euo pipefail
          chmod +x Scripts/build_app.sh Scripts/ensure_local_codesigning_identity.sh
          ./Scripts/build_app.sh

      - name: Verify bundle layout
        run: |
          set -euo pipefail
          test -f Build/VoiceInsert.app/Contents/Info.plist
          test -x Build/VoiceInsert.app/Contents/MacOS/VoiceInsert
          test -x Build/VoiceInsert.app/Contents/Helpers/VoiceInsertInjector

      - name: Create ZIP for distribution
        run: |
          set -euo pipefail
          ditto -c -k --keepParent Build/VoiceInsert.app Build/VoiceInsert-macos.zip
          shasum -a 256 Build/VoiceInsert-macos.zip | tee Build/VoiceInsert-macos.zip.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Build/VoiceInsert-macos.zip
            Build/VoiceInsert-macos.zip.sha256
          generate_release_notes: true
